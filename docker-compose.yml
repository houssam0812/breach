services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-breach}
      POSTGRES_USER: ${POSTGRES_USER:-breach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-breach}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-breach} -d ${POSTGRES_DB:-breach}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - breach_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-breach}:${POSTGRES_PASSWORD:-breach}@db:5432/${POSTGRES_DB:-breach}?schema=public
      NODE_ENV: production
      PORT: 4000
      FRONTEND_WEB_URL: ${FRONTEND_WEB_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  breach_postgres_data:
